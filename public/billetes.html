<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lluvia de Billetes</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
        }
        canvas {
            display: block;
        }
    </style>
</head>
<body>
<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// Crear una clase para los billetes
class Billete {
    constructor() {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * -canvas.height;  // Comienzan fuera de la pantalla
        this.width = 60;
        this.height = 30;
        this.speed = Math.random() * 3 + 2;  // Velocidad de caída
        this.angle = Math.random() * 360;    // Ángulo de rotación aleatorio
        this.rotationSpeed = Math.random() * 2 - 1;  // Velocidad de rotación
        this.image = new Image();
        this.image.src = 'https://en.numista.com/catalogue/photos/paraguay/5fd9720d498073.37976152-original.jpg';  // Imagen de billete
    }

    // Actualizar la posición y rotación del billete
    update() {
        this.y += this.speed;
        this.angle += this.rotationSpeed;

        // Si el billete sale de la pantalla, reubicarlo arriba
        if (this.y > canvas.height) {
            this.y = -this.height;
            this.x = Math.random() * canvas.width;
        }
    }

    // Dibujar el billete en el canvas
    draw() {
        ctx.save();
        ctx.translate(this.x + this.width / 2, this.y + this.height / 2);
        ctx.rotate((this.angle * Math.PI) / 180);
        ctx.drawImage(this.image, -this.width / 2, -this.height / 2, this.width, this.height);
        ctx.restore();
    }
}

// Crear varios billetes
const billetes = [];
for (let i = 0; i < 200; i++) {
    billetes.push(new Billete());
}

// Animar la lluvia de billetes
function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    billetes.forEach((billete) => {
        billete.update();
        billete.draw();
    });

    requestAnimationFrame(animate);
}

// Iniciar la animación
animate();

// Ajustar el tamaño del canvas si cambia el tamaño de la ventana
window.addEventListener('resize', () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
});
</script>
</body>
</html>
